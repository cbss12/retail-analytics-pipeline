version: 2

models:
  - name: fact_sales
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100000
          max_value: 1000000
    columns:
      - name: sale_id
        tests:
          - not_null
          - unique
      - name: sale_date
        tests:
          - not_null
      - name: store_key
        tests:
          - not_null
      - name: product_key
        tests:
          - not_null
      - name: units
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 100
      - name: total_revenue_usd
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100000
      - name: source
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: ["mexico_toys", "global_electronics"]